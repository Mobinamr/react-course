<!DOCTYPE html>
<html>
  <head>
    <title>Chatbot</title>
    <style>
      .input {
        width: 400px;
        padding: 12px 15px;
        border-radius: 10px;
        border-width: 1px;
        font-size: 15px;

        flex-grow: 1;
      }

      .user-image {
        width: 50px;
        height: 50px;
        margin-top: 20px;
        margin-bottom: 20px;
      }

      body {
        font-family: Arial, Helvetica, sans-serif;
      }

      .send-button {
        background-color: rgb(74, 169, 128);
        color: white;
        padding: 12px 20px;
        border: none;
        margin-left: 10px;
        border-radius: 10px;
        font-size: 15px;
        cursor: pointer;
      }

      .chat-input-container {
        display: flex;
      }

      .app-container {
        max-width: 600px;
        margin-left: auto;
        margin-right: auto;
        height: 100vh;
      }

      .user {
        display: flex;
        justify-content: end;
      }

      .robot {
        display: flex;
      }

      .chat-message-text {
        background-color: rgb(237, 237, 237);
        align-content: center;
        border-radius: 5px;
        padding-left: 15px;
        padding-right: 15px;
        padding-top: 10px;
        padding-bottom: 10px;
        margin-left: 10px;
        margin-right: 10px;
        margin-top: 20px;
        margin-bottom: 20px;
        max-width: 300px;
      }
    </style>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>
    <script src="https://unpkg.com/supersimpledev/chatbot.js"></script>
    <script src="https://unpkg.com/supersimpledev/babel.js">
  

    </script>
    <script type="text/babel">

      function ChatInput({ chatMessages, setChatMessages }) {

        const [inputText, setInputText] = React.useState('');

        function saveInputText(event) {
          setInputText(event.target.value);
        }


        function sendMessage() {
          const newChatMessages = [
            ...chatMessages, //gives a copy the array chatMessages
            {
              message: inputText,
              sender: 'user',
              id: crypto.randomUUID() //creates a random key
            }
          ];

          setChatMessages(newChatMessages);
          
          const response = Chatbot.getResponse(inputText); //from external library
          setChatMessages([
            ...newChatMessages, 
            {
              message: response,
              sender: 'robot',
              id: crypto.randomUUID() 
            }
          ]);
          setInputText(''); //sets the input to empty string after pressed send
        }

        return (
          <div className="chat-input-container">
            <input 
              className="input" 
              placeholder="Send a message to Chatbot"
              onChange={saveInputText}
              value={inputText}
            />
            <button
              onClick={sendMessage}
              className="send-button"
            >Send</button>
          </div>
        );
      }

      function ChatMessage( { message, sender } ) {
        //const message = props.message;
        //const sender = props.sender;
        /*
        if (sender === 'robot') {
          return (
            <div>
              <img class="user-image" src="images/robot.png" alt="" />
              {message}
            </div>
          );
        }
        */

        return ( //if the sender is user then classname is user else its robot
          <div className={
            sender === 'user'
            ? 'user'
            : 'robot'
          }> 
            {sender === 'robot' && (
              <img className="user-image" src="images/robot.png" alt="" />
              )} 
            <div className="chat-message-text">
              {message}
            </div>
            {sender === 'user' && (
              <img className="user-image" src="images/user.png" alt="" />
              )}
          </div>
        );
      }

      function ChatMessages({ chatMessages }) {
        return (
          <>
            {chatMessages.map((chatMessage) => {
                  return (
                    <ChatMessage 
                      message={chatMessage.message}
                      sender={chatMessage.sender}
                      key={chatMessage.id}
                    />
                  );
                })}
          </>
        );
      }



      function App() {
        const array = React.useState(
            [{
            message: 'hello Chatbot',
            sender: 'user',
            id: 'id1'
          }, {
            message: 'Hello! How can I help you?',
            sender: 'robot',
            id: 'id2'
          }, {
            message: 'What is todays date',
            sender: 'user',
            id: 'id3'
          }, {
            message: 'Todat is February 22',
            sender: 'robot',
            id: 'id4'
          }]);
        const chatMessages = array[0]; //a copy of the arrayvalue
        const setChatMessages = array[1];
        
        return (
          <div className="app-container">
            
            <ChatMessages
              chatMessages = {chatMessages}
            />
            <ChatInput
              chatMessages = {chatMessages}
              setChatMessages = {setChatMessages} 
            />
          </div>
        );
      }


      const container = document.querySelector('.js-container');
      ReactDOM.createRoot(container).render(<App />);
    </script>
  </body>
</html>
