<!DOCTYPE html>
<html>
  <head>
    <title>Chatbot</title>
    <style>
      .input {
        width: 250px;
      }

      .user-image {
        width: 50px;
      }
    </style>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js">
  

    </script>
    <script type="text/babel">

      function ChatInput() {
        return (
          <>
            <input 
              class="input" 
              placeholder="Send a message to Chatbot"
            />
            <button>Send</button>
          </>
        );
      }

      function ChatMessage( { message, sender } ) {
        //const message = props.message;
        //const sender = props.sender;

        /*
        if (sender === 'robot') {
          return (
            <div>
              <img class="user-image" src="images/robot.png" alt="" />
              {message}
            </div>
          );
        }
        */

        return (
          <div>
            {sender === 'robot' && (
              <img class="user-image" src="images/robot.png" alt="" />
              )} 
            {message}
            {sender === 'user' && (
              <img class="user-image" src="images/user.png" alt="" />
              )}
          </div>
        );
      }

      function ChatMessages() {
        const array = React.useState(
            [{
            message: 'hello Chatbot',
            sender: 'user',
            id: 'id1'
          }, {
            message: 'Hello! How can I help you?',
            sender: 'robot',
            id: 'id2'
          }, {
            message: 'What is todays date',
            sender: 'user',
            id: 'id3'
          }, {
            message: 'Todat is February 22',
            sender: 'robot',
            id: 'id4'
          }]);
        const chatMessages = array[0]; //a copy of the arrayvalue
        const setChatMessages = array[1];

        function sendMessage() {
          setChatMessages([
            ...chatMessages,
            {
              message: 'test',
              sender: 'user',
              id: crypto.randomUUID()
            }
          ]);
        }

        return (
          <>
            <button onClick={sendMessage} >Send message</button>

            {chatMessages.map((chatMessage) => {
                  return (
                    <ChatMessage 
                      message={chatMessage.message}
                      sender={chatMessage.sender}
                      key={chatMessage.id}
                    />
                  );
                })}
          </>
        );
      }



      function App() {
        return (
          <>
            <ChatInput />
            <ChatMessages />
          </>
        );
      }


      const container = document.querySelector('.js-container');
      ReactDOM.createRoot(container).render(<App />);
    </script>
  </body>
</html>
